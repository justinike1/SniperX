<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/icon-192.svg" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <link rel="mask-icon" href="/icon-192.svg" color="#10b981" />
    
    <!-- Microsoft Tiles -->
    <meta name="msapplication-TileColor" content="#0a0a0a" />
    <meta name="msapplication-TileImage" content="/icon-192.svg" />
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SniperX - AI Trading Bot" />

    <meta name="twitter:image" content="/icon-512.svg" />

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- This is a replit script which adds a banner on the top of the page when opened in development mode outside the replit environment -->
    <script type="text/javascript" src="https://replit.com/public/js/replit-dev-banner.js"></script>
  
<script>
document.addEventListener("DOMContentLoaded", () => {
  const status = document.getElementById("statusLog");

  function log(message) {
    const now = new Date().toLocaleTimeString();
    status.innerHTML += `<div>[${now}] ${message}</div>`;
  }

  const simulatePrice = () => (24 + Math.random()).toFixed(2);

  document.getElementById("buyBtn")?.addEventListener("click", () => {
    log("🟢 Simulated BUY at $" + simulatePrice());
  });

  document.getElementById("sellBtn")?.addEventListener("click", () => {
    log("🔴 Simulated SELL at $" + simulatePrice());
  });

  document.getElementById("simulateBtn")?.addEventListener("click", () => {
    log("📊 Simulated trade analysis: Detected strong trend.");
  });

  document.getElementById("startBotBtn")?.addEventListener("click", () => {
    log("🤖 SniperX BOT STARTED");
  });

  document.getElementById("stopBotBtn")?.addEventListener("click", () => {
    log("⛔ SniperX BOT STOPPED");
  });
});
</script>
<div id="statusLog" style="margin-top:20px; font-family:monospace; color:#10b981;"></div>

</body>
</html>
